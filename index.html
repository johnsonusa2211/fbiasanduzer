    h+=`<button onclick="rmApplyTransform()" style="width:100%;padding:8px;border:1px solid #fbbf24;background:rgba(251,191,36,0.15);color:#fbbf24;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px;cursor:pointer;margin-top:4px">APPLY TRANSFORM</button>`;
    h+=`</div>`;
    // Drag hint
    h+=`<div style="font-size:10px;color:var(--muted);margin-bottom:10px;line-height:1.6;padding:8px;border:1px solid var(--line3)">`;
    h+=`<span style="color:#fbbf24">●</span> Yellow = anchor points &nbsp; <span style="color:#a78bfa">●</span> Purple = curve handles<br>Drag directly on the map to reposition. Apply transform for bulk moves.`;
    h+=`</div>`;
    // Path output + copy
    h+=`<div style="font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:1px">CURRENT PATH (copy to save permanently)</div>`;
    const curPath=document.getElementById?'':(_rmSerializePath?_rmSerializePath(window._rmEditNodes||[]):'');
    h+=`<textarea id="rmPathOut" rows="4" readonly style="width:100%;padding:8px;border:1px solid var(--line);background:var(--faint);color:var(--sub);font-family:'JetBrains Mono',monospace;font-size:9px;resize:vertical;box-sizing:border-box;line-height:1.5"></textarea>`;
    h+=`<button id="rmCopyBtn" onclick="rmCopyPath()" style="width:100%;padding:7px;border:1px solid var(--line);background:transparent;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;margin-top:6px">Copy Path</button>`;
    h+=`</div>`;
  }

  // ── MINDSET CHECKPOINT ──
  const curMs=ms[Math.min(step,ms.length-1)];
  h+=`<div style="border:1px solid rgba(255,255,255,0.08);padding:24px;margin:12px 0 20px;background:linear-gradient(135deg,rgba(255,255,255,0.03),rgba(255,255,255,0.008));backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)">`;
  h+=`<div style="font-size:32px;text-align:center;margin-bottom:8px">${curMs.icon}</div>`;
  h+=`<div style="font-size:15px;font-weight:600;text-align:center;margin-bottom:8px;letter-spacing:1px;font-family:Inter,'Segoe UI',system-ui,sans-serif">${curMs.label}</div>`;
  h+=`<div style="font-size:12px;color:var(--muted);text-align:center;font-style:italic;line-height:1.7;max-width:320px;margin:0 auto">"${curMs.q}"</div>`;
  h+=`<div style="font-size:11px;color:var(--sub);text-align:center;line-height:1.7;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.05);max-width:320px;margin-left:auto;margin-right:auto">${curMs.qw}</div>`;
  h+=`</div>`;

  // ── PIPELINE SUMMARY ──
  h+=`<div class="sg">`;
  h+=`<div class="sc"><div class="sn">${challengeAccts.length}</div><div class="sl">Challenge</div></div>`;
  h+=`<div class="sc"><div class="sn">${verifyAccts.length}</div><div class="sl">Verification</div></div>`;
  h+=`<div class="sc"><div class="sn">${fundedAccts.length}</div><div class="sl">Funded</div></div>`;
  h+=`<div class="sc"><div class="sn">${accounts.length}</div><div class="sl">Total</div></div>`;
  h+=`</div>`;

  // ── PER ACCOUNT JOURNEY CARDS ──
  h+=`<hr class="sr dk"><div class="slbl">Account Pipeline</div>`;
  sorted.forEach(a=>{
    const fs=ftmoStatsForAccount(a,a.id);
    const rPer=fs.rPer;
    const rEarned=rPer>0?fs.cum/rPer:0;
    const phLabel=a.phase==="challenge"?"PHASE 1 — CHALLENGE":a.phase==="verification"?"PHASE 2 — VERIFICATION":"FUNDED";
    const phTag=a.phase==="challenge"?"C":a.phase==="verification"?"V":"F";

    h+=`<div style="border:1px solid var(--line);padding:16px;margin-bottom:12px">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">`;
    h+=`<div style="font-weight:600;font-size:14px">${a.name}</div>`;
    h+=`<span style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:2px;padding:4px 12px;border:1px solid var(--line)">${phLabel}</span></div>`;

    if(a.phase==="challenge"||a.phase==="verification"){
      // ── CHALLENGE / VERIFICATION PROGRESS ──
      const riskLabel=a.phase==="challenge"?"1.5%":"1.0%";
      const rNeeded=fs.tgt>0?fs.tgt/rPer:0;
      const rRemain=Math.max(0,rNeeded-rEarned);
      const passRate=a.phase==="challenge"?"91%":"100%";
      const avgDays=a.phase==="challenge"?14:8;

      // R progress
      h+=`<div style="display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:4px"><span>${rEarned.toFixed(1)}R earned</span><span>${rNeeded.toFixed(1)}R needed</span></div>`;
      h+=`<div class="ftmo-bar"><div class="ftmo-fill" style="width:${Math.min(fs.prog,100)}%"></div></div>`;
      h+=`<div style="display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:4px"><span>${fs.prog.toFixed(0)}%</span><span>$${fs.cum.toLocaleString(undefined,{maximumFractionDigits:0})} / $${fs.tgt.toLocaleString(undefined,{maximumFractionDigits:0})}</span></div>`;

      if(fs.prog>=100){
        h+=`<div style="margin-top:10px;padding:8px 16px;border:1px solid var(--text);text-align:center;font-size:12px;font-weight:600">TARGET REACHED — Ready for ${a.phase==="challenge"?"Phase 2":"Funded"}</div>`;
      }

      // Smart projection
      h+=`<div style="margin-top:12px;padding:10px 12px;border:1px solid var(--line3);font-family:'JetBrains Mono',monospace;font-size:11px;line-height:2">`;
      h+=`Risk: ${a.riskPct}% ($${rPer.toLocaleString()}/R)<br>`;
      h+=`Backtest avg: ${BT_R_MO}R/mo → pass in ~${avgDays} days<br>`;
      h+=`Pass rate: ${passRate} (from 74 monthly starts)<br>`;
      if(rRemain>0&&fs.daysPassed>0){
        const rPerDay=rEarned/fs.daysPassed;
        if(rPerDay>0){
          const daysToGo=Math.ceil(rRemain/rPerDay);
          const etaD=new Date(now.getTime()+daysToGo*864e5);
          h+=`Your pace: ${rPerDay.toFixed(2)}R/day → <strong>${daysToGo}d to pass</strong> (${etaD.toISOString().slice(0,10)})<br>`;
        }else{
          h+=`Your pace: calculating...<br>`;
        }
      }else if(rRemain>0&&fs.daysPassed===0){
        h+=`Expected: ~${avgDays} days to pass<br>`;
      }
      h+=`${fs.daysPassed}d elapsed · ${fs.daysLeft<999?fs.daysLeft+"d remaining":"ongoing"}</div>`;

      // DD safety
      const dailyLimitR=(a.accountSize*(a.maxDailyDD||5)/100)/rPer;
      const totalLimitR=(a.accountSize*(a.maxTotalDD||10)/100)/rPer;
      h+=`<div style="margin-top:8px;font-size:10px;color:var(--muted);line-height:1.6">Safety: Daily ${dailyLimitR.toFixed(1)}R buffer (worst day 2.04R) · Total ${totalLimitR.toFixed(1)}R buffer (worst DD 3.84R)</div>`;

    }else{
      // ── FUNDED ACCOUNT ──
      const moIncome=BT_R_MO*rPer*(a.profitSplit||80)/100;
      const yrIncome=moIncome*12;
      h+=`<div class="sg" style="margin-bottom:0">`;
      h+=`<div class="sc"><div class="sn">${fs.cum>=0?"+":""}$${fs.cum.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="sl">P&L</div></div>`;
      h+=`<div class="sc"><div class="sn">+$${fs.traderIncome.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="sl">${a.profitSplit||80}% Split</div></div>`;
      h+=`<div class="sc"><div class="sn">${rEarned.toFixed(1)}R</div><div class="sl">Total R</div></div>`;
      h+=`<div class="sc"><div class="sn">${fs.cnt}</div><div class="sl">Trades</div></div>`;
      h+=`</div>`;
      h+=`<div style="margin-top:12px;padding:10px 12px;border:1px solid var(--line3);font-family:'JetBrains Mono',monospace;font-size:11px;line-height:2">`;
      h+=`Projected: ~$${moIncome.toLocaleString(undefined,{maximumFractionDigits:0})}/mo = $${yrIncome.toLocaleString(undefined,{maximumFractionDigits:0})}/yr<br>`;
      if(fs.daysPassed>0&&fs.cum>0){
        const actualMoRate=(fs.traderIncome/fs.daysPassed)*30.4;
        h+=`Actual pace: $${actualMoRate.toLocaleString(undefined,{maximumFractionDigits:0})}/mo (${fs.daysPassed}d)<br>`;
      }
      h+=`DD used: ${fs.tdd.toFixed(2)}% / ${a.maxTotalDD||10}%</div>`;
    }
    h+=`</div>`;
  });

  // ── NEXT STEPS (smart suggestions) ──
  h+=`<hr class="sr dk"><div class="slbl">Next Steps</div>`;
  h+=`<div style="border:1px solid var(--line);padding:16px;font-size:12px;line-height:2">`;
  if(challengeAccts.length>0){
    challengeAccts.forEach(a=>{
      const fs=ftmoStatsForAccount(a,a.id);
      if(fs.prog>=100) h+=`<div>→ <strong>${a.name}:</strong> Phase 1 target reached — switch to Phase 2 (Verification)</div>`;
      else h+=`<div>→ <strong>${a.name}:</strong> Continue Phase 1 at ${a.riskPct}% risk. ${(fs.tgt-fs.cum>0)?"Need $"+(fs.tgt-fs.cum).toLocaleString(undefined,{maximumFractionDigits:0})+" more.":""}</div>`;
    });
  }
  if(verifyAccts.length>0){
    verifyAccts.forEach(a=>{
      const fs=ftmoStatsForAccount(a,a.id);
      if(fs.prog>=100) h+=`<div>→ <strong>${a.name}:</strong> Phase 2 complete — apply for Funded status</div>`;
      else h+=`<div>→ <strong>${a.name}:</strong> Phase 2 at 1.0% risk. Need $${Math.max(0,fs.tgt-fs.cum).toLocaleString(undefined,{maximumFractionDigits:0})} more.</div>`;
    });
  }
  if(fundedAccts.length>0&&fundedAccts.length<3){
    h+=`<div>→ Start Challenge for Account #${accounts.length+1} to scale income</div>`;
  }
  if(fundedAccts.length===0){
    h+=`<div>→ No funded accounts yet — focus on passing current challenge(s)</div>`;
  }
  h+=`</div>`;

  // ── $100K INCOME PROJECTION ──
  h+=`<hr class="sr dk"><div class="slbl">$100K Income Projection</div>`;
  const rPerAcct=fundedAccts.length>0?fundedAccts[0].accountSize*(fundedAccts[0].riskPct/100):500;
  const splitPct=fundedAccts.length>0?(fundedAccts[0].profitSplit||80):80;

  // Table: 1-5 accounts
  h+=`<div style="border:1px solid var(--line);overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:11px">`;
  h+=`<tr style="border-bottom:1px solid var(--line)"><th style="padding:8px 12px;text-align:left">Accounts</th><th style="padding:8px 12px;text-align:right">Monthly</th><th style="padding:8px 12px;text-align:right">Annual</th><th style="padding:8px 12px;text-align:right">Mo to $100K</th><th style="padding:8px 12px;text-align:center">Status</th></tr>`;
  for(let n=1;n<=5;n++){
    const moInc=BT_R_MO*rPerAcct*n*(splitPct/100);
    const yrInc=moInc*12;
    const moTo100k=moInc>0?Math.ceil(100000/moInc*10)/10:999;
    const isCurrent=n===fundedAccts.length;
    const hitsTarget=yrInc>=100000;
    h+=`<tr style="border-bottom:1px solid var(--line3);${isCurrent?"font-weight:700":""}">`;
    h+=`<td style="padding:8px 12px">${n}x $50K${isCurrent?" ◄":""}</td>`;
    h+=`<td style="padding:8px 12px;text-align:right">$${moInc.toLocaleString(undefined,{maximumFractionDigits:0})}</td>`;
    h+=`<td style="padding:8px 12px;text-align:right">$${yrInc.toLocaleString(undefined,{maximumFractionDigits:0})}</td>`;
    h+=`<td style="padding:8px 12px;text-align:right">${moTo100k.toFixed(1)}mo</td>`;
    h+=`<td style="padding:8px 12px;text-align:center">${hitsTarget?"TARGET":"—"}</td>`;
    h+=`</tr>`;
  }
  h+=`</table></div>`;
  h+=`<div style="margin-top:8px;font-size:11px;color:var(--muted)">Based on ${BT_R_MO}R/mo × $${rPerAcct.toLocaleString()}/R × ${splitPct}% split</div>`;

  // ── MINDSET JOURNEY ──
  h+=`<hr class="sr dk"><div class="slbl">Mindset Checkpoints</div>`;
  ms.forEach((m,i)=>{
    const isDone=i<step;
    const isCur=i===step&&step<ms.length;
    const isFut=i>step;
    h+=`<div style="display:flex;gap:14px;padding:14px 16px;margin-bottom:8px;border:1px solid ${isDone?"var(--line)":isCur?"var(--line)":"var(--line3)"};${isFut?"opacity:0.4":""}${isCur?";border-left:3px solid #FF9800":""};cursor:pointer" onclick="rmModal(${i})">`;
    h+=`<div style="font-size:22px;min-width:32px;text-align:center;padding-top:2px">${m.icon}</div>`;
    h+=`<div style="flex:1"><div style="font-size:12px;font-weight:700;margin-bottom:2px">${m.label} <span style="font-weight:400;color:var(--muted);font-size:10px">${m.sub}</span></div>`;
    h+=`<div style="font-size:11px;color:var(--muted);line-height:1.5;font-style:italic">"${m.q}"</div></div>`;
    if(isDone)h+=`<div style="color:#4CAF50;font-size:14px;padding-top:4px">\u2713</div>`;
    if(isCur)h+=`<div style="color:#FF9800;font-size:9px;font-weight:700;letter-spacing:1px;padding-top:6px;min-width:30px">NOW</div>`;
    h+=`</div>`;
  });

  // ── RISK FRAMEWORK SUMMARY ──
  h+=`<hr class="sr dk"><div class="slbl">Risk Framework</div>`;
  h+=`<div style="border:1px solid var(--line);padding:16px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:2.2">`;
  h+=`<strong>Challenge (P1):</strong> 1.5% risk · $750/R · 6.7R to pass · avg 14d<br>`;
  h+=`<strong>Verification (P2):</strong> 1.0% risk · $500/R · 5.0R to pass · avg 8d<br>`;
  h+=`<strong>Funded:</strong> 1.0% risk · $500/R · 80% split · ~$5,453/mo<br>`;
  h+=`<hr style="border:none;border-top:1px solid var(--line3);margin:8px 0">`;
  h+=`Daily kill switch: -3R ($1,500)<br>`;
  h+=`Weekly guard: -4R → reduce to 0.5%<br>`;
  h+=`Max open: 2 positions<br>`;
  h+=`Worst day ever: -2.04R · Worst DD: -3.84R<br>`;
  h+=`Daily limit buffer: 3.33R (1.3R safety margin)<br>`;
  h+=`</div>`;

  // ── CHALLENGE PASS RATES ──
  h+=`<hr class="sr dk"><div class="slbl">Backtest Pass Rates (74 starts)</div>`;
  h+=`<div style="border:1px solid var(--line);overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:11px">`;
  h+=`<tr style="border-bottom:1px solid var(--line)"><th style="padding:8px 12px;text-align:left">Risk</th><th style="padding:8px 12px;text-align:right">P1 Pass</th><th style="padding:8px 12px;text-align:right">P1+P2</th><th style="padding:8px 12px;text-align:right">Avg Days</th><th style="padding:8px 12px;text-align:center">Rec</th></tr>`;
  [{r:"1.0%",p1:"78%",p2:"78%",d:"32d",rec:""},{r:"1.5%",p1:"91%",p2:"91%",d:"22d",rec:"★"},{r:"2.0%",p1:"96%",p2:"95%",d:"17d",rec:""}].forEach(x=>{
    h+=`<tr style="border-bottom:1px solid var(--line3);${x.rec?"font-weight:700":""}"><td style="padding:8px 12px">${x.r}</td><td style="padding:8px 12px;text-align:right">${x.p1}</td><td style="padding:8px 12px;text-align:right">${x.p2}</td><td style="padding:8px 12px;text-align:right">${x.d}</td><td style="padding:8px 12px;text-align:center">${x.rec}</td></tr>`;
  });
  h+=`</table></div>`;
  h+=`<div style="margin-top:8px;font-size:11px;color:var(--muted)">★ 1.5% recommended: best balance of speed and daily DD safety (1.3R margin)</div>`;

  return h;
}

// ═══ SETUP ═══
function setFtmo(k,v){D.settings.ftmo[k]=v;save();R()}
function ftmoPreset(ph){D.settings.ftmo.phase=ph;if(ph==="challenge"){D.settings.ftmo.profitTarget=10}else if(ph==="verification"){D.settings.ftmo.profitTarget=5}else{D.settings.ftmo.profitTarget=0}save();R()}
function addFtmoAcct(){const n=D.settings.ftmoAccounts.length+1;D.settings.ftmoAccounts.push({...defAccount(),id:"acct_"+uid(),name:"Account #"+n});save();if(D.settings.gdSync&&D.settings.gdCid)gPush(true);R()}
function rmFtmoAcct(id){if(!confirm("Remove this account?"))return;D.settings.ftmoAccounts=D.settings.ftmoAccounts.filter(a=>a.id!==id);save();if(D.settings.gdSync&&D.settings.gdCid)gPush(true);R()}
function setAcct(id,k,v){const a=D.settings.ftmoAccounts.find(x=>x.id===id);if(a){a[k]=v;save();if(D.settings.gdSync&&D.settings.gdCid)gPush(true);R()}}
function acctPreset(id,ph){const a=D.settings.ftmoAccounts.find(x=>x.id===id);if(!a)return;a.phase=ph;if(ph==="challenge"){a.profitTarget=10;a.riskPct=1.5;a.daysAllowed=30}else if(ph==="verification"){a.profitTarget=5;a.riskPct=1.0;a.daysAllowed=60}else{a.profitTarget=0;a.riskPct=1.0;a.daysAllowed=0;a.profitSplit=80}save();if(D.settings.gdSync&&D.settings.gdCid)gPush(true);R()}
function pgSetup(){let h=`<div class="hl">Setup</div>`;
  h+=`<hr class="sr dk"><div class="slbl">Parameters</div><div class="fg"><div><label class="fl">Risk %</label><input type="number" class="fi" value="${D.settings.risk}" min="0.1" max="5" step="0.1" onchange="D.settings.risk=parseFloat(this.value)||1;save()"></div><div><label class="fl">Min R:R</label><input type="number" class="fi" value="${D.settings.rr}" min="1" max="10" step="0.5" onchange="D.settings.rr=parseFloat(this.value)||2;save()"></div></div><div style="margin-top:16px;font-size:13px;color:var(--sub)">London 15:30–23:00 · NY 20:30 DST / 21:30 Std · UTC+7</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">${PAIRS.map(p=>`<span style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 10px;border:1px solid var(--line2);border-radius:100px">${p}</span>`).join("")}</div>`;

  // ─── Default Partial TP ───
  const dp=D.settings.defaultPartial;
  h+=`<hr class="sr dk"><div class="slbl">Default Partial TP</div><label style="display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:16px" onclick="D.settings.defaultPartial=!D.settings.defaultPartial;save();R()"><div class="cc" style="width:20px;height:20px;${dp?"background:var(--accent);border-color:var(--accent);color:var(--accent-text)":""}">${dp?"✓":""}</div><span style="font-size:13px;color:${dp?"var(--text)":"var(--sub)"}">Enable partial TP on new trades</span></label>`;
  if(dp)h+=`<div class="fg"><div><label class="fl">Close %</label><input type="number" class="fi" value="${D.settings.defaultPartialPct}" min="10" max="90" step="10" onchange="D.settings.defaultPartialPct=parseInt(this.value)||50;save()"></div><div><label class="fl">TP1 R:R</label><input type="number" class="fi" value="${D.settings.defaultPartialRR}" min="0.5" max="3" step="0.1" onchange="D.settings.defaultPartialRR=parseFloat(this.value)||1.0;save()"></div></div><p class="bt" style="margin-top:12px">Close ${D.settings.defaultPartialPct}% at 1:${D.settings.defaultPartialRR} RR, let ${100-D.settings.defaultPartialPct}% run to full TP.</p>`;

  // ─── FTMO Multi-Account ───
  h+=`<hr class="sr dk"><div class="slbl">Prop Firm Accounts</div>`;
  h+=`<p class="bt" style="margin-bottom:16px">Manage multiple prop firm accounts. Tag trades to specific accounts in the trade form.</p>`;

  D.settings.ftmoAccounts.forEach((a,idx)=>{
    const phShort=a.phase==="challenge"?"C":a.phase==="verification"?"V":"F";
    h+=`<div style="border:1px solid var(--line);padding:16px;margin-bottom:16px">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="display:flex;align-items:center;gap:10px"><label style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="setAcct('${a.id}','enabled',!${a.enabled})"><div class="cc" style="width:18px;height:18px;font-size:10px;${a.enabled?"background:var(--accent);border-color:var(--accent);color:var(--accent-text)":""}">${a.enabled?"✓":""}</div></label><input class="fi" style="border:none;font-weight:600;font-size:14px;padding:0;width:100%;min-width:80px;max-width:220px" value="${esc(a.name)}" onchange="setAcct('${a.id}','name',this.value)"></div><button class="btn-t" style="font-size:11px" onclick="rmFtmoAcct('${a.id}')">Remove</button></div>`;

    if(a.enabled){
      h+=`<div style="margin-bottom:12px"><label class="fl">Phase</label><div class="tg"><button class="tb ${a.phase==="challenge"?"on":""}" onclick="acctPreset('${a.id}','challenge')">Challenge</button><button class="tb ${a.phase==="verification"?"on":""}" onclick="acctPreset('${a.id}','verification')">Verify</button><button class="tb ${a.phase==="funded"?"on":""}" onclick="acctPreset('${a.id}','funded')">Funded</button></div></div>`;
      h+=`<div class="fg"><div><label class="fl">Size ($)</label><input type="number" class="fi" value="${a.accountSize}" min="1000" step="1000" onchange="setAcct('${a.id}','accountSize',parseInt(this.value)||50000)"></div><div><label class="fl">Risk %</label><input type="number" class="fi" value="${a.riskPct}" min="0.1" max="5" step="0.1" onchange="setAcct('${a.id}','riskPct',parseFloat(this.value)||1)"></div></div>`;
      h+=`<div class="fg" style="margin-top:12px"><div><label class="fl">Target %</label><input type="number" class="fi" value="${a.profitTarget}" min="0" max="20" step="0.5" onchange="setAcct('${a.id}','profitTarget',parseFloat(this.value)||10)"></div><div><label class="fl">Max Daily DD %</label><input type="number" class="fi" value="${a.maxDailyDD}" min="1" max="10" step="0.5" onchange="setAcct('${a.id}','maxDailyDD',parseFloat(this.value)||5)"></div></div>`;
      h+=`<div class="fg" style="margin-top:12px"><div><label class="fl">Max Total DD %</label><input type="number" class="fi" value="${a.maxTotalDD}" min="1" max="20" step="0.5" onchange="setAcct('${a.id}','maxTotalDD',parseFloat(this.value)||10)"></div><div><label class="fl">Start Date</label><input type="date" class="fi" value="${a.startDate}" onchange="setAcct('${a.id}','startDate',this.value)"></div></div>`;
      h+=`<div class="fg" style="margin-top:12px"><div><label class="fl">Days Allowed</label><input type="number" class="fi" value="${a.daysAllowed}" min="0" step="1" onchange="setAcct('${a.id}','daysAllowed',parseInt(this.value)||0)"></div>${a.phase==="funded"?`<div><label class="fl">Profit Split %</label><input type="number" class="fi" value="${a.profitSplit||80}" min="50" max="100" step="5" onchange="setAcct('${a.id}','profitSplit',parseInt(this.value)||80)"></div>`:""}</div>`;
      h+=`<div style="margin-top:12px"><label class="fl">Notes</label><input class="fi" value="${esc(a.notes||"")}" placeholder="Broker, account #, payout date..." onchange="setAcct('${a.id}','notes',this.value)"></div>`;
      const riskD=a.accountSize*(a.riskPct/100),tgt=a.accountSize*(a.profitTarget/100);
      h+=`<div style="margin-top:12px;padding:10px 12px;border:1px solid var(--line3);font-size:11px;line-height:1.8;font-family:'JetBrains Mono',monospace">Risk: $${riskD.toLocaleString()} · ${a.profitTarget>0?"Target: $"+tgt.toLocaleString()+" · ":""}DD limits: $${(a.accountSize*a.maxDailyDD/100).toLocaleString()} daily / $${(a.accountSize*a.maxTotalDD/100).toLocaleString()} total</div>`;
    }
    h+=`</div>`;
  });

  h+=`<button class="btn-b" onclick="addFtmoAcct()" style="width:100%">+ Add Account</button>`;

  // ─── $100K Goal Tracker ───
  const gl=D.settings.goal;
  h+=`<hr class="sr dk"><div class="slbl">$100K Goal Tracker</div>`;
  h+=`<p class="bt" style="margin-bottom:16px">Track total profit target across all funded accounts. Combines realized payouts + unrealized funded P&L.</p>`;
  h+=`<label style="display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:16px" onclick="D.settings.goal.enabled=!D.settings.goal.enabled;save();R()"><div class="cc" style="width:20px;height:20px;${gl.enabled?"background:var(--accent);border-color:var(--accent);color:var(--accent-text)":""}">${gl.enabled?"✓":""}</div><span style="font-size:13px;color:${gl.enabled?"var(--text)":"var(--sub)"}">Enable $100K Goal Tracker</span></label>`;
  if(gl.enabled){
    h+=`<div class="fg"><div><label class="fl">Target ($)</label><input type="number" class="fi" value="${gl.target}" min="1000" step="1000" onchange="D.settings.goal.target=parseInt(this.value)||100000;save()"></div><div><label class="fl">Start Date</label><input type="date" class="fi" value="${gl.startDate||""}" onchange="D.settings.goal.startDate=this.value;save()"></div></div>`;
    h+=`<div style="margin-top:12px;padding:10px 12px;border:1px solid var(--line3);font-size:11px;line-height:1.8;font-family:'JetBrains Mono',monospace">Target: $${(gl.target||100000).toLocaleString()} · Payouts logged: ${(gl.payouts||[]).length} · Start: ${gl.startDate||"not set"}</div>`;
  }

  h+=`<hr class="sr dk"><div class="slbl">Google Drive</div><p class="bt" style="margin-bottom:16px">Sync data & images to Google Drive. Images are stored in a <strong>"${IMG_FOLDER}"</strong> folder.</p><div style="margin-bottom:16px"><label class="fl">OAuth Client ID</label><input class="fi" value="${esc(D.settings.gdCid||"")}" placeholder="xxxx.apps.googleusercontent.com" onchange="GD._r=null;GD._clearToken();GD.folderId=null;D.settings.gdCid=this.value.trim();save()"></div><label style="display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:16px"><div class="cc" style="width:20px;height:20px;${D.settings.gdSync?"background:var(--accent);border-color:var(--accent);color:var(--accent-text)":""}" onclick="D.settings.gdSync=!D.settings.gdSync;save();startAutoSync();R()">${D.settings.gdSync?"✓":""}</div><span style="font-size:13px;color:var(--sub)">Auto-sync (push on save + pull every 30s)</span></label>`;
  if(D.settings.gdCid)h+=`<div style="display:flex;gap:10px"><button class="btn-a" onclick="gPush()" ${gSt==="syncing"?"disabled":""}>Push</button><button class="btn-b" onclick="gPull()" ${gSt==="syncing"?"disabled":""}>Pull</button></div>`;

  h+=`<hr class="sr"><div class="slbl">Backup</div><div style="display:flex;gap:10px"><button class="btn-b" onclick="expJ()">Export JSON</button><label class="btn-b" style="cursor:pointer">Import<input type="file" accept=".json" class="hid" onchange="impJ(this)"></label></div>`;
  h+=`<hr class="sr"><div class="slbl" style="color:var(--text)">Danger</div><button class="btn-t" style="color:var(--text)" onclick="clr()">Clear all data</button>`;
  return h}

// ═══ ACTIONS ═══
function go(id){tab=id;if(id==="new"&&!editId)window._f=null;if(id==="new"&&editId){const t=D.trades.find(x=>x.id===editId);window._f=t?{...t,checklist:{...t.checklist},images:[...(t.images||[])]}:null}R();window.scrollTo({top:0,behavior:"smooth"})}
function td(d){D.avoidDays.includes(d)?D.avoidDays=D.avoidDays.filter(x=>x!==d):D.avoidDays.push(d);save();R()}
function uf(k,v){if(!window._f)return;window._f[k]=v;
  // Auto-fill partial legs when overall result changes
  if(k==="result"&&window._f.usePartial&&!window._f.leg1Result&&!window._f.leg2Result){
    if(v==="WIN"){window._f.leg1Result="WIN";window._f.leg2Result="WIN"}
    else if(v==="LOSS"){window._f.leg1Result="LOSS";window._f.leg2Result="LOSS"}
    else if(v==="BE"){window._f.leg1Result="WIN";window._f.leg2Result="LOSS"}
  }R()}
function tc(id){if(!window._f)return;window._f.checklist[id]=!window._f.checklist[id];R()}
function toggleAcct(aid){if(!window._f)return;if(!window._f.ftmoAccounts)window._f.ftmoAccounts=[];const i=window._f.ftmoAccounts.indexOf(aid);if(i>=0)window._f.ftmoAccounts.splice(i,1);else window._f.ftmoAccounts.push(aid);R()}
function selAllAccts(){if(!window._f)return;window._f.ftmoAccounts=D.settings.ftmoAccounts.filter(a=>a.enabled).map(a=>a.id);R()}

// ─── IMAGE HANDLING ───
async function addI(el){
  const files=Array.from(el.files||[]);el.value="";
  if(!files.length)return;
  const hasDrive=!!D.settings.gdCid;

  for(const f of files){
    if(!f.type.startsWith("image/"))continue;
    if(f.size>10*1024*1024){toast("Max 10MB","error");continue}

    if(hasDrive){
      // Upload to Google Drive with progress
      imgUploading=true;uplPct=0;R();
      try{
        await GD.init(D.settings.gdCid);
        // Read file as blob URL BEFORE uploading so it's cached instantly
        const localUrl=URL.createObjectURL(f);
        const res=await GD.uploadImage(f,pct=>{uplPct=pct;R()});
        // Cache the blob URL so image shows immediately (no re-fetch needed)
        _blobCache.set(res.driveId,localUrl);
        window._f.images.push({id:uid(),name:res.name,driveId:res.driveId});
        toast("Image uploaded ☁");
      }catch(e){
        console.error(e);
        // Fallback to base64
        const data=await readFile(f);
        window._f.images.push({id:uid(),name:f.name,data});
        toast("Drive failed — saved locally","warn");
      }
      imgUploading=false;uplPct=0;R();
    }else{
      // Store as base64 locally
      const data=await readFile(f);
      window._f.images.push({id:uid(),name:f.name,data});
      R();
    }
  }
}
function readFile(f){return new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(f)})}

async function rmI(i){
  if(!window._f)return;
  const im=window._f.images[i];
  if(im?.driveId&&D.settings.gdCid){
    try{await GD.init(D.settings.gdCid);await GD.deleteImage(im.driveId);toast("Deleted from Drive")}catch{toast("Drive delete failed","warn")}
  }
  window._f.images.splice(i,1);R();
}

function svTr(){const f=window._f;if(!f||!f.result){alert("Select a result");return}f.checklistOk=CK.every(c=>f.checklist[c.id]);
  // Auto-calc RR from prices
  const _ar=calcRRFromPrices(f.entry,f.sl,f.tp,f.direction);if(_ar!==null)f.rr=String(_ar);
  if(f.usePartial){const _pr=calcRRFromPrices(f.entry,f.sl,f.tp1,f.direction);if(_pr!==null)f.partialRR=String(_pr)}
  // Auto-determine results from exit prices
  if(f.exitPrice&&!f.usePartial){const xr=calcRRFromPrices(f.entry,f.sl,f.exitPrice,f.direction);if(xr!==null){if(Math.abs(xr)<0.05)f.result="BE";else f.result=xr>0?"WIN":"LOSS"}}
  if(f.usePartial){
    if(f.leg1Exit){const lr=calcRRFromPrices(f.entry,f.sl,f.leg1Exit,f.direction);if(lr!==null){if(Math.abs(lr)<0.05)f.leg1Result="BE";else f.leg1Result=lr>0?"WIN":"LOSS"}}
    if(f.leg2Exit){const lr=calcRRFromPrices(f.entry,f.sl,f.leg2Exit,f.direction);if(lr!==null){if(Math.abs(lr)<0.05)f.leg2Result="BE";else f.leg2Result=lr>0?"WIN":"LOSS"}}
  }
  // Compute partial TP combined R
  if(f.usePartial&&f.leg1Result&&f.leg2Result){f.combinedR=calcCombinedR(f)}else if(!f.usePartial){f.combinedR="";f.leg1Result="";f.leg2Result="";f.leg1Exit="";f.leg2Exit="";f.tp1=""}
  // Compute dollar P&L — actualPL overrides everything, then riskDollar, then account-based
  const _actPL=parseFloat(f.actualPL);
  if(!isNaN(_actPL)){f.dollarPL=_actPL}
  else{const riskD=parseFloat(f.riskDollar);
  const taggedAccts=(f.ftmoAccounts||[]).map(aid=>D.settings.ftmoAccounts.find(a=>a.id===aid)).filter(Boolean);
  if(!isNaN(riskD)&&riskD>0){f.dollarPL=Math.round(tradeR(f)*riskD*100)/100}
  else if(taggedAccts.length>0){const a=taggedAccts[0];const rPer=a.accountSize*(a.riskPct/100);f.dollarPL=Math.round(tradeR(f)*rPer*100)/100}
  else{const ft=D.settings.ftmo;if(ft&&ft.enabled){const rPer=ft.accountSize*(ft.riskPct/100);f.dollarPL=Math.round(tradeR(f)*rPer*100)/100}else{f.dollarPL=null}}}
  if(editId){const i=D.trades.findIndex(t=>t.id===editId);if(i>=0)D.trades[i]={...f,id:editId,updatedAt:Date.now()}}else D.trades.push({...f,id:uid(),updatedAt:Date.now()});save();editId=null;window._f=null;tab="log";toast("Saved");R();if(D.settings.gdSync&&D.settings.gdCid)gPush()}
function del(id){if(!confirm("Delete?"))return;D.trades=D.trades.filter(t=>t.id!==id);if(!D.deletedIds)D.deletedIds=[];D.deletedIds.push({id,deletedAt:Date.now()});save();toast("Deleted","warn");R();if(D.settings.gdSync&&D.settings.gdCid)gPush(true)}
function expJ(){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(D,null,2)],{type:"application/json"}));a.download=`OCC_${new Date().toISOString().slice(0,10)}.json`;a.click();toast("Exported")}
function impJ(el){const f=el.files?.[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.trades){migrate(d);D=d;save();toast(`${d.trades.length} trades imported`);R()}}catch{toast("Invalid","error")}};rd.readAsText(f);el.value=""}
function clr(){if(!confirm("Clear all data?"))return;const th=D.settings.theme;D={trades:[],avoidDays:[],settings:defSettings()};D.settings.theme=th;save();toast("Cleared","warn");R()}

R();
</script>
