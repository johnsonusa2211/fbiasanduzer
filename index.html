<!DOCTYPE html>
<html lang="en" data-theme="original">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>OCC — Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══ THEME: ORIGINAL (Stark B&W) ═══ */
[data-theme="original"] {
  --bg:#fff;--bg2:#fafafa;--card:#fff;--line:#000;--line2:#e0e0e0;--line3:#f0f0f0;
  --text:#000;--sub:#666;--muted:#999;--dim:#ccc;--faint:#f0f0f0;
  --accent:#000;--accent-text:#fff;--hover:#f5f5f5;
  --toast-bg:#000;--toast-text:#fff;
  --lb-bg:rgba(255,255,255,.96);
  --meta-color:#fff;
}
/* ═══ THEME: DARK (Soft contrast) ═══ */
[data-theme="dark"] {
  --bg:#1a1a2e;--bg2:#1e1e34;--card:#22223a;--line:#3a3a5c;--line2:#2e2e4a;--line3:#262642;
  --text:#e0e0ec;--sub:#9898b8;--muted:#686888;--dim:#4a4a68;--faint:#2a2a46;
  --accent:#e0e0ec;--accent-text:#1a1a2e;--hover:#2a2a46;
  --toast-bg:#e0e0ec;--toast-text:#1a1a2e;
  --lb-bg:rgba(26,26,46,.96);
  --meta-color:#1a1a2e;
}
/* ═══ THEME: LIGHT (Paper Journal) ═══ */
[data-theme="light"] {
  --bg:#f0e8d8;--bg2:#e8dfc8;--card:#ebe2d0;--line:#a0906e;--line2:#d4c9a8;--line3:#dfd6c0;
  --text:#33291a;--sub:#5e5040;--muted:#8a7c66;--dim:#bfb496;--faint:#e6dcc6;
  --accent:#33291a;--accent-text:#f0e8d8;--hover:#e6dcc6;
  --toast-bg:#33291a;--toast-text:#f0e8d8;
  --lb-bg:rgba(240,232,216,.97);
  --meta-color:#f0e8d8;
}
[data-theme="light"] body {
  background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
}
[data-theme="light"] .fi {
  background: rgba(255,252,245,.45);
  border-bottom-color: var(--dim);
}
[data-theme="light"] .fi:focus {
  background: rgba(255,252,245,.7);
}
[data-theme="light"] .sc,
[data-theme="light"] .pi,
[data-theme="light"] .ti,
[data-theme="light"] .mi,
[data-theme="light"] .ck {
  border-color: var(--line2);
}
[data-theme="light"] .sg {
  border-color: var(--line);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
html { -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; transition: background .3s, color .3s }
body {
  font-family: 'Space Grotesk', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100dvh; -webkit-font-smoothing: antialiased;
}
::selection { background: var(--accent); color: var(--accent-text) }
::-webkit-scrollbar { width: 0; height: 0 }
input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(.4) }
[data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(.7) }
select option { background: var(--bg); color: var(--text) }

.app { max-width: 520px; margin: 0 auto; padding: 0 24px 100px }

/* ═══ TOAST ═══ */
.toast {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 999; padding: 10px 24px; font-size: 13px; font-weight: 500;
  animation: sld .4s cubic-bezier(.16,1,.3,1);
  max-width: 88vw; white-space: nowrap; border-radius: 100px;
  background: var(--toast-bg); color: var(--toast-text);
}
@keyframes sld { from { transform: translate(-50%,-20px); opacity: 0 } to { transform: translate(-50%,0); opacity: 1 } }

/* ═══ HEADER ═══ */
.hdr {
  display: flex; justify-content: space-between; align-items: center;
  padding: 24px 0 20px; border-bottom: 1px solid var(--line); margin-bottom: 32px;
}
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 3px; line-height: 1; text-transform: uppercase }
.logo span { font-family: 'Space Grotesk', sans-serif; font-size: 10px; font-weight: 400; color: var(--muted); vertical-align: super; margin-left: 6px; letter-spacing: 2px }
.hdr-r { display: flex; align-items: center; gap: 10px }
.theme-sel {
  -webkit-appearance: none; appearance: none;
  background: transparent; border: 1px solid var(--dim); border-radius: 100px;
  color: var(--sub); font-size: 10px; font-family: 'Space Grotesk', sans-serif;
  font-weight: 500; padding: 6px 12px; cursor: pointer; outline: none;
  letter-spacing: .5px;
}
.sync-dot {
  width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; cursor: pointer; background: transparent; color: var(--text);
}
.sync-dot:active { background: var(--accent); color: var(--accent-text) }

/* ═══ NAV ═══ */
nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--bg); border-top: 1px solid var(--line);
  padding: 0 0 max(env(safe-area-inset-bottom), 0px);
}
.nav-inner { display: flex; max-width: 520px; margin: 0 auto }
.nt {
  flex: 1; border: none; background: transparent; color: var(--muted);
  font-size: 9px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase;
  cursor: pointer; font-family: 'Space Grotesk', sans-serif;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 12px 0 10px; transition: .15s;
}
.nt .ni { font-size: 18px; line-height: 1 }
.nt.on { color: var(--text) }
.nt.on::after { content: ''; display: block; width: 4px; height: 4px; border-radius: 50%; background: var(--text); margin-top: -2px }

/* ═══ TYPO ═══ */
.hl { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px }
.hl-sm { font-family: 'Bebas Neue', sans-serif; font-size: 32px; line-height: 1.1; letter-spacing: .5px; text-transform: uppercase }
.slbl { font-size: 9px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px }
.sr { border: none; border-top: 1px solid var(--line2); margin: 32px 0 }
.sr.dk { border-top-color: var(--line) }
.bt { font-size: 14px; line-height: 1.65; color: var(--sub) }

/* ═══ STATS ═══ */
.sg { display: grid; grid-template-columns: repeat(2, 1fr); border-top: 1px solid var(--line) }
.sc { padding: 24px 0; border-bottom: 1px solid var(--line2); text-align: center }
.sc:nth-child(odd) { border-right: 1px solid var(--line2) }
.sn { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700; letter-spacing: -1px }
.sl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 600; margin-top: 4px }

/* ═══ PAIRS ═══ */
.pl { border-top: 1px solid var(--line) }
.pi { display: flex; align-items: center; justify-content: space-between; padding: 18px 0; border-bottom: 1px solid var(--line2) }
.pn { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; letter-spacing: 1px }
.ps { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace }

/* ═══ MONTHLY ═══ */
.mi { display: flex; align-items: center; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--line3) }
.mb { flex: 1; height: 2px; background: var(--line3); position: relative }
.mf { position: absolute; top: 0; left: 0; height: 100%; background: var(--text); transition: width .6s }

/* ═══ FORMS ═══ */
.fl { font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 8px }
.fi {
  width: 100%; padding: 12px 0; background: transparent;
  border: none; border-bottom: 1px solid var(--line2);
  color: var(--text); font-size: 15px; font-family: 'JetBrains Mono', monospace;
  outline: none; transition: .2s;
}
.fi:focus { border-bottom-color: var(--line) }
.fi::placeholder { color: var(--dim) }
textarea.fi { resize: vertical; font-family: 'Space Grotesk', sans-serif; line-height: 1.6; min-height: 80px }
select.fi { cursor: pointer; -webkit-appearance: none }
.fg { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 24px }
.sp { padding: 6px 14px; background: transparent; border: 1px solid var(--dim); border-radius: 100px; color: var(--sub); font-size: 11px; font-family: 'JetBrains Mono', monospace; cursor: pointer; font-weight: 500 }

/* ═══ BUTTONS ═══ */
.btn-a {
  padding: 14px 32px; background: var(--accent); border: none; border-radius: 100px;
  color: var(--accent-text); font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: 'Space Grotesk', sans-serif; transition: .2s; letter-spacing: .3px;
}
.btn-a:active { opacity: .7 } .btn-a:disabled { opacity: .25 }
.btn-b {
  padding: 12px 24px; background: transparent; border: 1px solid var(--line);
  border-radius: 100px; color: var(--text); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: 'Space Grotesk', sans-serif; transition: .2s;
}
.btn-b:active { background: var(--accent); color: var(--accent-text) }
.btn-t { background: none; border: none; color: var(--muted); font-size: 12px; font-weight: 500; cursor: pointer; text-decoration: underline; text-underline-offset: 3px }

/* ═══ TOGGLE ═══ */
.tg { display: flex; border: 1px solid var(--line); border-radius: 100px; overflow: hidden }
.tb {
  flex: 1; padding: 12px 0; border: none; background: transparent;
  font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Space Grotesk', sans-serif;
  color: var(--muted); transition: .15s; letter-spacing: .5px;
}
.tb.on { background: var(--accent); color: var(--accent-text) }
.rg { display: flex; gap: 8px }
.rp {
  flex: 1; padding: 14px 8px; border: 1.5px solid var(--line2);
  border-radius: 100px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'Space Grotesk', sans-serif; background: transparent;
  color: var(--muted); transition: .15s; text-align: center;
}
.rp.W { border-color: var(--line); background: var(--accent); color: var(--accent-text) }
.rp.L { border-color: var(--line); background: var(--faint); color: var(--text) }
.rp.B { border-color: var(--dim); color: var(--sub); background: var(--faint) }

/* ═══ CHECKLIST ═══ */
.ck { display: flex; align-items: flex-start; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--line3); cursor: pointer }
.ck:last-child { border-bottom: none }
.cc {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid var(--dim); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; transition: .15s; margin-top: 1px;
}
.ck.on .cc { background: var(--accent); border-color: var(--accent); color: var(--accent-text) }
.ct { font-size: 14px; font-weight: 500; color: var(--muted); transition: .15s }
.ck.on .ct { color: var(--text) }
.cd { font-size: 12px; color: var(--dim); margin-top: 3px; line-height: 1.5 }
.ck.on .cd { color: var(--muted) }

/* ═══ TRADE LOG ═══ */
.ti { padding: 18px 0; border-bottom: 1px solid var(--line3); cursor: pointer; transition: .1s }
.ti:active { opacity: .6 }
.tt { display: flex; align-items: center; justify-content: space-between }
.tl { display: flex; align-items: center; gap: 12px }
.rd { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0 }
.rd.W,.rd.WIN { background: var(--text) } .rd.L,.rd.LOSS { background: transparent; border: 1.5px solid var(--text) } .rd.B,.rd.BE { background: var(--dim) }
.tp { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600 }
.tm { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace }
.te { padding: 14px 0 6px 22px; font-size: 12px; color: var(--sub); line-height: 1.7 }
.teg { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px,1fr)); gap: 8px; margin-bottom: 8px }
.tel { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); font-weight: 600 }
.tev { font-family: 'JetBrains Mono', monospace; font-size: 12px; margin-top: 2px }
.ta { display: flex; gap: 12px; justify-content: flex-end; padding-top: 8px }
.pbadge { font-size: 9px; font-weight: 700; letter-spacing: 1px; color: var(--muted); border: 1px solid var(--dim); border-radius: 3px; padding: 1px 4px; margin-left: -4px }

/* ═══ FTMO ═══ */
.ftmo-banner {
  padding: 14px 16px; border: 1px solid var(--line); margin-bottom: 24px;
  cursor: pointer; transition: .15s;
}
.ftmo-banner:active { opacity: .7 }
.ftmo-bar {
  height: 6px; border-radius: 100px; background: var(--faint); overflow: hidden;
}
.ftmo-fill {
  height: 100%; border-radius: 100px; background: var(--text); transition: width .6s ease;
}
.ftmo-fill.ftmo-danger { background: var(--text); animation: ftmoPulse 1.2s infinite }
@keyframes ftmoPulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.fi-ro { background: var(--faint) !important; color: var(--muted) !important; cursor: default }

/* ═══ RULES ═══ */
.rn { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 24px }
.rpill {
  padding: 7px 16px; border: 1px solid var(--line2); border-radius: 100px;
  font-size: 10px; font-weight: 600; letter-spacing: .5px; cursor: pointer;
  font-family: 'Space Grotesk', sans-serif; background: transparent;
  color: var(--muted); transition: .15s; white-space: nowrap;
}
.rpill.on { background: var(--accent); color: var(--accent-text); border-color: var(--accent) }
.rpill:active { opacity: .7 }
.rblk { margin-bottom: 24px }
.rh { font-family: 'Bebas Neue', sans-serif; font-size: 22px; margin-bottom: 12px; line-height: 1.2; letter-spacing: 1px; text-transform: uppercase }
.rli { display: flex; gap: 12px; padding: 5px 0; font-size: 13px; color: var(--sub); line-height: 1.6; align-items: flex-start }
.rli strong { color: var(--text); font-weight: 600 }
.rnum { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--dim); min-width: 18px; margin-top: 4px; font-weight: 600 }
.rdiv { border: none; border-top: 1px solid var(--line3); margin: 20px 0 }

/* ═══ DAYS ═══ */
.dc {
  padding: 10px 20px; border: 1.5px solid var(--line2); border-radius: 100px;
  font-size: 12px; font-weight: 500; cursor: pointer;
  font-family: 'Space Grotesk', sans-serif; background: transparent; color: var(--muted); transition: .15s;
}
.dc.bad { background: var(--accent); color: var(--accent-text); border-color: var(--accent) }
.dc:active { opacity: .7 }

/* ═══ IMAGES ═══ */
.ir { display: flex; gap: 10px; flex-wrap: wrap }
.ith { position: relative; width: 72px; height: 72px; border-radius: 10px; overflow: hidden; cursor: pointer; flex-shrink: 0; border: 1px solid var(--line2); background: var(--faint); transition: transform .15s }
.ith:active { transform: scale(.95) }
.ith img { width: 100%; height: 100%; object-fit: cover }
.ith.loading { background: linear-gradient(90deg, var(--faint) 25%, var(--line3) 50%, var(--faint) 75%); background-size: 200% 100%; animation: shimmer 1.5s ease infinite }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.ix { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; background: rgba(0,0,0,.65); border: none; color: #fff; border-radius: 50%; font-size: 10px; cursor: pointer; line-height: 20px; padding: 0; backdrop-filter: blur(4px) }
.ip { width: 72px; height: 72px; border-radius: 10px; border: 1.5px dashed var(--dim); background: transparent; color: var(--dim); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; gap: 2px; flex-shrink: 0; transition: border-color .2s }
.ip:hover { border-color: var(--accent) }
/* Upload progress overlay */
.upl-wrap { position: relative; width: 72px; height: 72px; border-radius: 10px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--line2); background: var(--faint) }
.upl-wrap .upl-bg { position: absolute; inset: 0; background: var(--accent); opacity: .08 }
.upl-wrap .upl-bar { position: absolute; bottom: 0; left: 0; height: 100%; background: var(--accent); opacity: .15; transition: width .3s ease }
.upl-wrap .upl-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px }
.upl-wrap .upl-ring { width: 28px; height: 28px; animation: upl-spin 1s linear infinite }
.upl-wrap .upl-pct { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--text) }
@keyframes upl-spin { to { transform: rotate(360deg) } }
/* ═══ IMAGE VIEWER PANEL ═══ */
.img-viewer { position: fixed; inset: 0; z-index: 1000; display: flex; flex-direction: column; animation: iv-in .25s cubic-bezier(.16,1,.3,1) }
.img-viewer .iv-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px) }
.img-viewer .iv-header { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; flex-shrink: 0 }
.img-viewer .iv-counter { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(255,255,255,.6); letter-spacing: 1px }
.img-viewer .iv-close { width: 36px; height: 36px; border-radius: 50%; border: none; background: rgba(255,255,255,.12); color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); transition: background .2s }
.img-viewer .iv-close:hover { background: rgba(255,255,255,.22) }
.img-viewer .iv-body { position: relative; z-index: 2; flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; touch-action: pan-x pinch-zoom; padding: 0 12px }
.img-viewer .iv-body img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 6px; user-select: none; -webkit-user-select: none; transition: transform .3s cubic-bezier(.16,1,.3,1) }
.img-viewer .iv-nav { position: absolute; top: 50%; transform: translateY(-50%); z-index: 3; width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(255,255,255,.1); color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); transition: background .2s, opacity .2s }
.img-viewer .iv-nav:hover { background: rgba(255,255,255,.22) }
.img-viewer .iv-nav.prev { left: 12px }
.img-viewer .iv-nav.next { right: 12px }
.img-viewer .iv-dots { position: relative; z-index: 2; display: flex; justify-content: center; gap: 6px; padding: 16px 20px; flex-shrink: 0 }
.img-viewer .iv-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.25); border: none; cursor: pointer; padding: 0; transition: all .2s }
.img-viewer .iv-dot.on { background: #fff; transform: scale(1.3) }
@keyframes iv-in { from { opacity: 0; transform: scale(.97) } to { opacity: 1; transform: scale(1) } }
@media(max-width:600px){
  .img-viewer .iv-nav { width: 32px; height: 32px; font-size: 14px }
  .img-viewer .iv-nav.prev { left: 6px }
  .img-viewer .iv-nav.next { right: 6px }
}

/* ═══ CORR ═══ */
.cg { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; border-top: 1px solid var(--line2); padding-top: 20px }
.cv { text-align: center }
.cvn { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700 }
.cvl { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; font-weight: 600 }

.wb { padding: 16px 20px; border: 1px solid var(--line); font-size: 13px; font-weight: 500; margin-bottom: 24px }
.eb { text-align: center; padding: 60px 24px }
.hid { display: none }
</style>
</head>
<body>
<div id="app" class="app"></div>
<nav id="bnav"></nav>
<script>
const PAIRS=["EURUSD","GBPUSD","ETHUSD","ADAUSD","AVEUSD","LNKUSD","LTCUSD","BNBUSD","NAS100"],DAYLIST=["Monday","Tuesday","Wednesday","Thursday","Friday"];
const CR={EURUSD:["GBPUSD"],GBPUSD:["EURUSD"],ETHUSD:["ADAUSD","LTCUSD","BNBUSD"],ADAUSD:["ETHUSD","LTCUSD","BNBUSD"],AVEUSD:["LNKUSD"],LNKUSD:["AVEUSD"],LTCUSD:["ETHUSD","ADAUSD","BNBUSD"],BNBUSD:["ETHUSD","ADAUSD","LTCUSD"],NAS100:[]};
const CK=[
  {id:"s1",n:"01",l:"OCC Zone Established",d:"15M candle (C0) closed. Zone High &amp; Low including wicks. Session auto-selects by date — see Session tab for current times."},
  {id:"s2",n:"02",l:"Break of Structure",d:"C2 full body CLOSE outside zone — not wick or pin bar (R5). Body closes beyond zone boundary."},

  {id:"s4",n:"04",l:"Valid Imbalance Gap",d:"No overlap C1 & C3 full candles (wicks included). Gap between them required (R2)."},

function lastSunday(y,m){const d=new Date(Date.UTC(y,m,0));d.setUTCDate(d.getUTCDate()-d.getUTCDay());return d.getUTCDate()}
function secondSundayMar(y){const d=new Date(Date.UTC(y,2,1));const dow=d.getUTCDay();const first=dow===0?1:8-dow;return first+7}
function firstSundayNov(y){const d=new Date(Date.UTC(y,10,1));const dow=d.getUTCDay();return dow===0?1:8-dow}

function mergeDat(local,remote){
  // Merge tombstones — union by id, keep newer deletedAt
  const delMap=new Map();
  for(const x of(local.deletedIds||[]))delMap.set(x.id,x);
  for(const x of(remote.deletedIds||[])){const ex=delMap.get(x.id);if(!ex||(x.deletedAt||0)>(ex.deletedAt||0))delMap.set(x.id,x)}
  // Prune tombstones older than 90 days to prevent unbounded growth
  const cutoff=Date.now()-90*24*60*60*1000;
  const deletedIds=Array.from(delMap.values()).filter(x=>(x.deletedAt||0)>cutoff);
  const deletedSet=new Set(deletedIds.map(x=>x.id));
  // Merge trades, skipping any tombstoned IDs
  const map=new Map();
  for(const t of(local.trades||[]))if(!deletedSet.has(t.id))map.set(t.id,t);
  for(const t of(remote.trades||[])){if(deletedSet.has(t.id))continue;const ex=map.get(t.id);if(!ex||(t.updatedAt||0)>(ex.updatedAt||0))map.set(t.id,t)}
  const avoidSet=new Set([...(local.avoidDays||[]),...(remote.avoidDays||[])]);
  // Merge settings — take remote as base, but keep local device-specific keys (auth, theme)
  const ls=local.settings||{},rs=remote.settings||{};
  // Merge ftmoAccounts by id — keep newer (more fields = enabled) entry per account
  const acctMap=new Map();
  for(const a of(ls.ftmoAccounts||[]))acctMap.set(a.id,a);
  for(const a of(rs.ftmoAccounts||[])){const ex=acctMap.get(a.id);if(!ex)acctMap.set(a.id,a);}
  // Merge goal payouts by id
  const payMap=new Map();
  for(const p of(ls.goal?.payouts||[]))payMap.set(p.id,p);
  for(const p of(rs.goal?.payouts||[]))if(!payMap.has(p.id))payMap.set(p.id,p);
  const mergedSettings={
    ...ls,                                           // local base (preserves gdCid, gdSync, theme)
    ...rs,                                           // remote overrides everything else
    gdCid:ls.gdCid,gdSync:ls.gdSync,theme:ls.theme, // always keep local device prefs
    ftmoAccounts:Array.from(acctMap.values()),
    goal:{...ls.goal,...(rs.goal||{}),payouts:Array.from(payMap.values())}
  };
  return{...local,settings:mergedSettings,trades:Array.from(map.values()),avoidDays:Array.from(avoidSet),deletedIds};
}

function calcRRFromPrices(entry,sl,target,dir){
  const e=parseFloat(entry),s=parseFloat(sl),t=parseFloat(target);
  if(isNaN(e)||isNaN(s)||isNaN(t)||e===s)return null;
  const risk=Math.abs(e-s),reward=dir==="LONG"?(t-e):(e-t);
  return Math.round((reward/risk)*1000)/1000}
function calcCombinedR(f){
  const pct=(parseFloat(f.partialPct)||50)/100;
  const eV=parseFloat(f.entry),sV=parseFloat(f.sl);
  if(isNaN(eV)||isNaN(sV)||eV===sV){const pRR=parseFloat(f.partialRR)||1.0,fullRR=parseFloat(f.rr)||0;let r=0;if(f.leg1Result==="WIN")r+=pct*pRR;else if(f.leg1Result==="LOSS")r-=pct;if(f.leg2Result==="WIN")r+=(1-pct)*fullRR;else if(f.leg2Result==="LOSS")r-=(1-pct);return Math.round(r*1000)/1000}
  const risk=Math.abs(eV-sV);let r=0;
  const l1=parseFloat(f.leg1Exit);
  if(!isNaN(l1)){r+=pct*((f.direction==="LONG"?(l1-eV):(eV-l1))/risk)}
  else if(f.leg1Result==="WIN"){const tp1=parseFloat(f.tp1);if(!isNaN(tp1))r+=pct*((f.direction==="LONG"?(tp1-eV):(eV-tp1))/risk);else r+=pct*(parseFloat(f.partialRR)||1)}
  else if(f.leg1Result==="LOSS")r-=pct;
  const l2=parseFloat(f.leg2Exit);
  if(!isNaN(l2)){r+=(1-pct)*((f.direction==="LONG"?(l2-eV):(eV-l2))/risk)}
  else if(f.leg2Result==="WIN"){const tp=parseFloat(f.tp);if(!isNaN(tp))r+=(1-pct)*((f.direction==="LONG"?(tp-eV):(eV-tp))/risk);else r+=(1-pct)*(parseFloat(f.rr)||0)}
  else if(f.leg2Result==="LOSS")r-=(1-pct);
  return Math.round(r*1000)/1000
}
function tradeR(t){
  if(t.usePartial&&t.combinedR!==""&&t.combinedR!==null&&t.combinedR!==undefined)return parseFloat(t.combinedR)||0;
  if(t.exitPrice){const rr=calcRRFromPrices(t.entry,t.sl,t.exitPrice,t.direction);if(rr!==null)return rr}
  if(t.result==="WIN")return parseFloat(t.rr)||0;if(t.result==="LOSS")return-1;return 0
}

function ftmoStatsForAccount(s,acctId){

  // Total DD: from INITIAL balance — equity must never drop below (initial - max%)

    runCum+=daily[k].pl;
  });

}

async function _queueDriveImg(driveId,full){

  async pull(){const t=await this.t(),f=await this.find();if(!f)return null;return(await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`,{headers:{Authorization:`Bearer ${t}`}})).json()},
  async lastModified(){const f=await this.find();return f?.modifiedTime||null}
};
// Track last push time for smart sync
let _lastPushTime=0;
async function gPush(silent){if(!silent){gSt="syncing";R()}try{await GD.init(D.settings.gdCid);const _f=await GD.find();if(_f?.modifiedTime){const _rt=new Date(_f.modifiedTime).getTime();if(_rt>_lastPushTime+5000){const _r=await GD.pull();if(_r?.trades){migrate(_r);D=mergeDat(D,_r);save();R()}}}await GD.push(D);_lastPushTime=Date.now();if(!silent){gSt="ok";toast("Pushed to Drive")}}catch(e){if(!silent){gSt="err";toast(e==="err"?"Auth expired — tap again":"Sync failed","error")}}if(!silent){R();setTimeout(()=>{gSt="idle";R()},3e3)}}
async function gPull(silent){if(!silent){gSt="syncing";R()}try{await GD.init(D.settings.gdCid);const r=await GD.pull();if(r?.trades){const localCount=D.trades.length;migrate(r);D=mergeDat(D,r);save();const merged=D.trades.length;if(!silent){gSt="ok";toast(`Synced — ${merged} trades`)}else if(merged!==localCount){toast("Synced from another device");gPush(true)}}_lastPushTime=Date.now();if(!silent&&!(r?.trades)){gSt="idle";toast("No backup","warn")}}catch(e){if(!silent){gSt="err";toast(e==="err"?"Auth expired — tap again":"Pull failed","error")}}if(!silent){R();setTimeout(()=>{gSt="idle";R()},3e3)}else R()}
// Auto-sync: pull on load, then poll every 30s for changes from other devices
async function _autoSync(){
  if(!D.settings.gdSync||!D.settings.gdCid||!GD.tk)return;
  try{
    const f=await GD.find();
    if(!f?.modifiedTime)return;
    const remoteTime=new Date(f.modifiedTime).getTime();
    // Only pull if remote is newer than our last push
    if(remoteTime>_lastPushTime+5000){await gPull(true)}
  }catch{}}
function startAutoSync(){
  if(_syncInterval)clearInterval(_syncInterval);
  if(!D.settings.gdSync||!D.settings.gdCid)return;
  // Initial pull on page load (delayed to allow token restore)
  setTimeout(()=>_autoSync(),2000);
  // Poll every 30 seconds
  _syncInterval=setInterval(()=>_autoSync(),30000)}
// Initialize Drive on page load (restores cached token → enables image loading)
if(D.settings.gdCid){GD.init(D.settings.gdCid).then(ok=>{if(ok&&GD.tk)R()})}
// Start auto-sync and restart on visibility change (phone wakes up)
startAutoSync();
document.addEventListener("visibilitychange",()=>{if(!document.hidden){if(D.settings.gdCid&&!GD.tk)GD.init(D.settings.gdCid).then(()=>R());setTimeout(()=>_autoSync(),1000)}});

// ═══ Ring ═══
function ringBW(v,sz=40){const sw=2,r=(sz-sw)/2,c=2*Math.PI*r,o=c-(v/100)*c;
  return`<svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--line2)" stroke-width="${sw}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--text)" stroke-width="${sw}" stroke-dasharray="${c}" stroke-dashoffset="${o}" stroke-linecap="round" style="transition:.6s"/></svg>`}

function stats(){
  const a=D.trades,f=fP==="ALL"?a:a.filter(t=>t.pair===fP);
  const w=f.filter(t=>t.result==="WIN"),l=f.filter(t=>t.result==="LOSS"),b=f.filter(t=>t.result==="BE");
  const wr=f.length?(w.length/f.length)*100:0,rr=f.reduce((s,t)=>s+tradeR(t),0);
  const bp={};PAIRS.forEach(p=>{const pt=a.filter(t=>t.pair===p),pw=pt.filter(t=>t.result==="WIN");bp[p]={t:pt.length,w:pw.length,r:pt.length?(pw.length/pt.length)*100:0}});
  const mo={};a.forEach(t=>{const k=t.date?.slice(0,7);if(!k)return;if(!mo[k])mo[k]={w:0,l:0,t:0};mo[k].t++;if(t.result==="WIN")mo[k].w++;if(t.result==="LOSS")mo[k].l++});
  return{total:f.length,wins:w.length,losses:l.length,be:b.length,wr,rr,bp,mo}}
function corrCalc(){const res=[],seen=new Set();Object.entries(CR).forEach(([p,cs])=>cs.forEach(cp=>{const k=[p,cp].sort().join("-");if(seen.has(k))return;seen.add(k);const dm={};D.trades.filter(t=>t.pair===p||t.pair===cp).forEach(t=>{if(!t.date)return;if(!dm[t.date])dm[t.date]={};dm[t.date][t.pair]=t});let sd=0,tot=0,bw=0,bl=0,cw=0,ct=0;Object.values(dm).forEach(d=>{const a=d[p],b=d[cp];if(a&&b){tot++;if(a.direction===b.direction)sd++;if(a.result==="WIN"&&b.result==="WIN")bw++;if(a.result==="LOSS"&&b.result==="LOSS")bl++}[a,b].filter(Boolean).forEach(t=>{if(t.corrLinked){ct++;if(t.result==="WIN")cw++}})});res.push({k,p,cp,tot,sd,bw,bl,align:tot?(sd/tot)*100:0,cwr:ct?(cw/ct)*100:0,ct})}));return res}

// ═══ TRADING HOURS ═══
function tradingHoursCard(){
  const now=new Date();
  const bst=isUkBst(now),dst=isUsDst(now);
  const h7=now.getUTCHours()+7,m7=now.getUTCMinutes(); // approx UTC+7
  const curMin=(h7%24)*60+m7;
  // Session times
  const ldnEur={h:14,m:30,label:"14:30"},ldnOther=bst?{h:14,m:30,label:"14:30 (BST)"}:{h:15,m:30,label:"15:30 (GMT)"};
  const ny=dst?{h:20,m:30,label:"20:30 (DST)"}:{h:21,m:30,label:"21:30 (ST)"};
  const ldnCut={h:23,m:0,label:"23:00"},nyCut={h:24,m:0,label:"00:00"};
  // Session status
  const ldnEurStart=ldnEur.h*60+ldnEur.m,ldnOtherStart=ldnOther.h*60+ldnOther.m,nyStart=ny.h*60+ny.m;
  const ldnEnd=ldnCut.h*60,nyEnd=nyCut.h*60;
  function sesStatus(start,end){
    if(curMin>=start&&curMin<end)return"LIVE";
    if(curMin<start)return"upcoming";
    return"closed";
  }
  const ldnSt=sesStatus(Math.min(ldnEurStart,ldnOtherStart),ldnEnd);
  const nySt=sesStatus(nyStart,nyEnd);
  // DST status labels
  const ukLabel=bst?"UK: BST (summer)":"UK: GMT (winter)";
  const usLabel=dst?"US: EDT (summer)":"US: EST (winter)";
  // Next DST change
  const yr=now.getFullYear(),mo=now.getMonth()+1;
  let nextDstEvent="";
  if(bst){nextDstEvent=`UK → GMT: last Sun Oct ${yr}`}
  else if(mo<=3){nextDstEvent=`UK → BST: last Sun Mar ${yr}`}
  else{nextDstEvent=`UK → BST: last Sun Mar ${yr+1}`}
  if(dst){nextDstEvent+=` · US → EST: 1st Sun Nov ${yr}`}
  else if(mo<=3){nextDstEvent+=` · US → EDT: 2nd Sun Mar ${yr}`}
  else{nextDstEvent+=` · US → EDT: 2nd Sun Mar ${yr+1}`}

  const dot=(st)=>st==="LIVE"?`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--text);margin-right:4px;animation:ftmoPulse 1.2s infinite"></span>`:`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;border:1px solid var(--dim);margin-right:4px"></span>`;
  const stBadge=(st)=>st==="LIVE"?`<span style="font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--text)">LIVE</span>`:st==="upcoming"?`<span style="font-size:9px;font-weight:600;letter-spacing:1px;color:var(--muted)">UPCOMING</span>`:`<span style="font-size:9px;font-weight:600;letter-spacing:1px;color:var(--dim)">CLOSED</span>`;

  let h=`<div style="border:1px solid var(--line);padding:16px;margin-bottom:24px">`;
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted)">Trading Hours</span><span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim)">${ukLabel} · ${usLabel}</span></div>`;

  // London section
  h+=`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px">LONDON</span>${dot(ldnSt)}${stBadge(ldnSt)}</div>`;
  h+=`<div style="display:grid;grid-template-columns:auto 1fr;gap:2px 12px;font-size:12px;font-family:'JetBrains Mono',monospace">`;
  h+=`<span style="color:var(--muted)">EURUSD</span><span style="font-weight:600">${ldnEur.label} → ${ldnCut.label} UTC+7</span>`;
  h+=`<span style="color:var(--muted)">GBPUSD+</span><span style="font-weight:600">${ldnOther.label} → ${ldnCut.label} UTC+7</span>`;
  h+=`<span style="color:var(--muted)">Crypto</span><span style="font-weight:600">${ldnOther.label} → ${ldnCut.label} UTC+7</span>`;
  h+=`</div></div>`;

  // NY section
  h+=`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px">NEW YORK</span>${dot(nySt)}${stBadge(nySt)}</div>`;
  h+=`<div style="display:grid;grid-template-columns:auto 1fr;gap:2px 12px;font-size:12px;font-family:'JetBrains Mono',monospace">`;
  h+=`<span style="color:var(--muted)">All pairs</span><span style="font-weight:600">${ny.label} → ${nyCut.label} UTC+7</span>`;
  h+=`<span style="color:var(--muted)">USATECH</span><span style="font-weight:600">${ny.label} → ${nyCut.label} (NY only)</span>`;
  h+=`</div></div>`;

  // B5 thresholds quick ref
  h+=`<div style="border-top:1px solid var(--line3);padding-top:8px;margin-top:4px"><div style="font-size:9px;color:var(--dim);letter-spacing:1px;font-weight:600;margin-bottom:4px">B5 THRESHOLDS (AUTO)</div>`;
  h+=`<div style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap">`;
  h+=`<span>LDN Forex: <strong style="color:var(--text)">40%</strong></span>`;
  h+=`<span>NY Forex: <strong style="color:var(--text)">5%</strong></span>`;
  h+=`<span>NY USATECH: <strong style="color:var(--text)">12%</strong></span>`;
  h+=`<span>Crypto: <strong style="color:var(--text)">40/5%</strong></span>`;
  h+=`</div></div>`;

  // DST calendar with exact dates
  const dstDates=getDstDates(yr);
  h+=`<div style="border-top:1px solid var(--line3);padding-top:8px;margin-top:6px">`;
  h+=`<div style="font-size:9px;color:var(--dim);letter-spacing:1px;font-weight:600;margin-bottom:6px">DST CALENDAR ${yr}</div>`;
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;font-size:11px">`;
  h+=`<div style="color:var(--muted)">US DST → EDT</div><div style="font-family:'JetBrains Mono',monospace;color:var(--text)">${dstDates.usDstStart} <span style="color:var(--dim)">NY→20:30</span></div>`;
  h+=`<div style="color:var(--muted)">UK BST start</div><div style="font-family:'JetBrains Mono',monospace;color:var(--text)">${dstDates.ukBstStart} <span style="color:var(--dim)">LDN→14:30</span></div>`;
  h+=`<div style="color:var(--muted)">UK BST end</div><div style="font-family:'JetBrains Mono',monospace;color:var(--text)">${dstDates.ukBstEnd} <span style="color:var(--dim)">LDN→15:30</span></div>`;
  h+=`<div style="color:var(--muted)">US DST → EST</div><div style="font-family:'JetBrains Mono',monospace;color:var(--text)">${dstDates.usDstEnd} <span style="color:var(--dim)">NY→21:30</span></div>`;
  h+=`</div>`;
  // Gap period warning: US is DST but UK still GMT
  if(dst&&!bst){h+=`<div style="margin-top:6px;padding:6px 10px;border:1px solid var(--dim);font-size:10px;color:var(--muted)">GAP PERIOD NOW: US is DST but UK still GMT — London GBPUSD at 15:30, NY at 20:30</div>`}
  h+=`</div>`;

  h+=`</div>`;
  return h;
}

      allStats.filter(x=>x.a.phase==="funded").forEach(({s,a})=>{
        const moIncome=13.63*s.rPer*(a.profitSplit||80)/100;
        h+=`${a.name}: ~$${moIncome.toLocaleString(undefined,{maximumFractionDigits:0})}/month<br>`;
      });
      const totalMo=allStats.filter(x=>x.a.phase==="funded").reduce((s,{s:fs,a})=>s+13.63*fs.rPer*(a.profitSplit||80)/100,0);
      h+=`<strong>Combined: ~$${totalMo.toLocaleString(undefined,{maximumFractionDigits:0})}/month = $${(totalMo*12).toLocaleString(undefined,{maximumFractionDigits:0})}/year</strong></div>`;
    }
  } else {
    // ── SINGLE ACCOUNT VIEW ──
    const a=accounts.find(x=>x.id===ftmoSub);
    if(!a){ftmoSub="dashboard";return pgFtmo()}
    const fs=ftmoStatsForAccount(a,a.id);

    h+=`<div style="margin-bottom:20px"><div class="hl-sm">${a.name}</div></div>`;
    h+=renderAcctCard(fs,a);

    // Daily breakdown
    const days=Object.entries(fs.daily).sort((b,c)=>c[0].localeCompare(b[0]));
    if(days.length){
      h+=`<hr class="sr dk"><div class="slbl">Daily Breakdown</div><div style="border-top:1px solid var(--line)">`;
      days.forEach(([dk,dv])=>{
        h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line3)"><div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600">${dk}</div><div style="font-size:11px;color:var(--muted)">${dv.n} trade${dv.n>1?"s":""}</div></div><div style="text-align:right"><div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600">${dv.pl>=0?"+":""}$${dv.pl.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div style="font-size:11px;color:var(--muted)">Cum: ${dv.cum>=0?"+":""}$${dv.cum.toLocaleString(undefined,{maximumFractionDigits:0})}</div></div></div>`;
      });
      h+=`</div>`;
    }

    // Account rules
    h+=`<hr class="sr dk"><div class="slbl">Account Rules</div>`;
    h+=`<div style="border:1px solid var(--line);padding:16px;font-size:12px;line-height:2;font-family:'JetBrains Mono',monospace">`;
    h+=`Phase: ${a.phase.toUpperCase()}<br>`;
    h+=`Risk/Trade: ${a.riskPct}% ($${(a.accountSize*a.riskPct/100).toLocaleString()})<br>`;
    h+=`Max Daily DD: ${a.maxDailyDD}% ($${(a.accountSize*a.maxDailyDD/100).toLocaleString()})<br>`;
    h+=`Max Total DD: ${a.maxTotalDD}% ($${(a.accountSize*a.maxTotalDD/100).toLocaleString()})<br>`;
    if(fs.tgt>0)h+=`Target: ${a.profitTarget}% ($${fs.tgt.toLocaleString()})<br>`;
    if(a.phase==="funded")h+=`Profit Split: ${a.profitSplit}%<br>`;
    h+=`</div>`;
    if(a.notes)h+=`<div style="margin-top:12px;padding:12px 16px;border:1px solid var(--line3);font-size:12px;color:var(--sub);line-height:1.6">${esc(a.notes)}</div>`;
  }

  return h}

function addPayout(){
  const g=D.settings.goal;
  g.payouts.push({id:uid(),date:new Date().toISOString().slice(0,10),amount:0,account:"",notes:""});
  save();R();
}
function rmPayout(id){D.settings.goal.payouts=D.settings.goal.payouts.filter(p=>p.id!==id);save();R()}
function setPayout(id,k,v){const p=D.settings.goal.payouts.find(x=>x.id===id);if(p){p[k]=v;save();R()}}

function pgGoal(accounts){
  const g=D.settings.goal;
  const target=g.target||100000;
  const payouts=(g.payouts||[]).sort((a,b)=>(a.date||"").localeCompare(b.date||""));

  // Calculate total realized (actual payouts received)
  const totalPaid=payouts.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);

  // Calculate unrealized (funded account P&L not yet paid out)
  const fundedAccts=accounts.filter(a=>a.phase==="funded");
  let totalUnrealized=0;
  fundedAccts.forEach(a=>{
    const fs=ftmoStatsForAccount(a,a.id);
    if(fs.cum>0)totalUnrealized+=fs.cum*(a.profitSplit||80)/100;
  });

  const totalProgress=totalPaid+totalUnrealized;
  const pct=target>0?Math.min((totalProgress/target)*100,100):0;
  const pctPaid=target>0?Math.min((totalPaid/target)*100,100):0;
  const remaining=Math.max(0,target-totalProgress);

  // Time-based projections
  const startDate=g.startDate?new Date(g.startDate+"T00:00:00"):null;
  const now=new Date();
  const daysActive=startDate?Math.max(1,Math.floor((now-startDate)/864e5)):0;
  const dailyRate=daysActive>0?totalProgress/daysActive:0;
  const monthlyRate=dailyRate*30.4;
  const daysToTarget=dailyRate>0?Math.ceil(remaining/dailyRate):0;
  const etaDate=daysToTarget>0?new Date(now.getTime()+daysToTarget*864e5):null;

  // Per-month payout breakdown
  const monthlyPayouts={};
  payouts.forEach(p=>{const m=p.date?.slice(0,7);if(m){if(!monthlyPayouts[m])monthlyPayouts[m]=0;monthlyPayouts[m]+=parseFloat(p.amount)||0}});

  let h="";

  // ── HERO: BIG PROGRESS ──
  h+=`<div style="text-align:center;padding:24px 0"><div style="font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">PROFIT TARGET</div>`;
  h+=`<div style="font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:800;letter-spacing:-2px">$${target.toLocaleString()}</div>`;
  h+=`</div>`;

  // Big ring progress
  const sz=180,sw=8,r=(sz-sw)/2,c=2*Math.PI*r;
  const oPaid=c-(pctPaid/100)*c;
  const oTotal=c-(pct/100)*c;
  h+=`<div style="display:flex;justify-content:center;margin:16px 0;position:relative">`;
  h+=`<svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)">`;
  h+=`<circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--line2)" stroke-width="${sw}"/>`;
  h+=`<circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--dim)" stroke-width="${sw}" stroke-dasharray="${c}" stroke-dashoffset="${oTotal}" stroke-linecap="round" style="transition:1s"/>`;
  h+=`<circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--text)" stroke-width="${sw}" stroke-dasharray="${c}" stroke-dashoffset="${oPaid}" stroke-linecap="round" style="transition:1s"/>`;
  h+=`</svg>`;
  h+=`<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">`;
  h+=`<div style="font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:800">${pct.toFixed(1)}%</div>`;
  h+=`<div style="font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px">OF TARGET</div>`;
  h+=`</div></div>`;

  // Legend
  h+=`<div style="display:flex;justify-content:center;gap:24px;margin-bottom:16px;font-size:11px">`;
  h+=`<span><span style="display:inline-block;width:12px;height:3px;background:var(--text);margin-right:6px;vertical-align:middle"></span>Paid Out</span>`;
  h+=`<span><span style="display:inline-block;width:12px;height:3px;background:var(--dim);margin-right:6px;vertical-align:middle"></span>Unrealized</span>`;
  h+=`</div>`;

  // Stats grid
  h+=`<div class="sg">`;
  h+=`<div class="sc"><div class="sn">$${totalPaid.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="sl">Paid Out</div></div>`;
  h+=`<div class="sc"><div class="sn">$${totalUnrealized.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="sl">Unrealized</div></div>`;
  h+=`<div class="sc"><div class="sn">$${totalProgress.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="sl">Total Progress</div></div>`;
  h+=`<div class="sc"><div class="sn">$${remaining.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="sl">Remaining</div></div>`;
  h+=`</div>`;

  // ── SMART PROJECTIONS ──
  if(daysActive>0){
    h+=`<hr class="sr"><div class="slbl">Smart Projection</div>`;
    h+=`<div style="border:1px solid var(--line);padding:16px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:2.2">`;
    h+=`Started: ${g.startDate} (${daysActive} days ago)<br>`;
    h+=`Earning rate: $${dailyRate.toFixed(0)}/day = <strong>$${monthlyRate.toFixed(0)}/month</strong><br>`;
    if(remaining>0&&daysToTarget>0){
      h+=`Remaining: $${remaining.toLocaleString(undefined,{maximumFractionDigits:0})}<br>`;
      h+=`ETA: <strong>${Math.ceil(daysToTarget/30.4)} months</strong> (${etaDate?etaDate.toISOString().slice(0,10):""})<br>`;
    }else if(remaining<=0){
      h+=`<strong>TARGET REACHED!</strong><br>`;
    }

    // Projected monthly income based on funded accounts
    const fundedStats=fundedAccts.map(a=>({a,s:ftmoStatsForAccount(a,a.id)}));
    if(fundedStats.length>0){
      h+=`<br>Per funded account (backtest avg 13.6R/mo):<br>`;
      let projMo=0;
      fundedStats.forEach(({a,s})=>{
        const mo=13.63*s.rPer*(a.profitSplit||80)/100;
        projMo+=mo;
        h+=`  ${a.name}: ~$${mo.toLocaleString(undefined,{maximumFractionDigits:0})}/mo<br>`;
      });
      h+=`  <strong>Combined: ~$${projMo.toLocaleString(undefined,{maximumFractionDigits:0})}/mo</strong><br>`;
      if(remaining>0&&projMo>0){
        const moToGo=remaining/projMo;
        const projDate=new Date(now.getTime()+moToGo*30.4*864e5);
        h+=`  Projected ETA: <strong>${moToGo.toFixed(1)} months</strong> (${projDate.toISOString().slice(0,10)})<br>`;
      }
    }
    h+=`</div>`;

    // ── MILESTONE MARKERS ──
    const milestones=[25000,50000,75000,100000,150000,200000].filter(m=>m<=target*1.5);
    h+=`<hr class="sr"><div class="slbl">Milestones</div>`;
    milestones.forEach(m=>{
      const reached=totalProgress>=m;
      const mpct=Math.min((m/target)*100,100);
      h+=`<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--line3)">`;
      h+=`<div class="cc" style="width:20px;height:20px;font-size:10px;${reached?"background:var(--accent);border-color:var(--accent);color:var(--accent-text)":""}">${reached?"✓":""}</div>`;
      h+=`<div style="flex:1"><div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:${reached?"700":"400"};${reached?"":"color:var(--muted)"}">$${m.toLocaleString()}</div></div>`;
      if(reached){
        // Find when this milestone was reached (approximate from payouts)
        let cum=0;let hitDate="";
        for(const p of payouts){cum+=parseFloat(p.amount)||0;if(cum>=m&&!hitDate)hitDate=p.date}
        if(hitDate)h+=`<span style="font-size:11px;color:var(--muted)">${hitDate}</span>`;
      }
      h+=`</div>`;
    });
  }

  // ── PAYOUT LOG ──
  h+=`<hr class="sr dk"><div class="slbl">Payout History</div>`;
  h+=`<p class="bt" style="margin-bottom:16px">Log each withdrawal from your funded accounts. This tracks your real, realized income.</p>`;

  if(payouts.length>0){
    // Monthly summary
    const months=Object.entries(monthlyPayouts).sort((a,b)=>b[0].localeCompare(a[0]));
    if(months.length>1){
      h+=`<div style="border:1px solid var(--line);padding:12px 16px;margin-bottom:16px">`;
      months.forEach(([m,amt])=>{
        h+=`<div style="display:flex;justify-content:space-between;padding:4px 0;font-family:'JetBrains Mono',monospace;font-size:12px"><span>${m}</span><span style="font-weight:600">+$${amt.toLocaleString(undefined,{maximumFractionDigits:0})}</span></div>`;
      });
      h+=`</div>`;
    }

    // Individual payouts
    h+=`<div style="border-top:1px solid var(--line)">`;
    payouts.slice().reverse().forEach(p=>{
      const acctName=accounts.find(a=>a.id===p.account)?.name||p.account||"—";
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line3)">`;
      h+=`<div><div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600">+$${(parseFloat(p.amount)||0).toLocaleString(undefined,{maximumFractionDigits:0})}</div>`;
      h+=`<div style="font-size:11px;color:var(--muted)">${p.date||"no date"} · ${acctName}${p.notes?" · "+esc(p.notes):""}</div></div>`;
      h+=`<button class="btn-t" style="font-size:10px" onclick="rmPayout('${p.id}')">x</button></div>`;
    });
    h+=`</div>`;
  }else{
    h+=`<div style="padding:24px 0;text-align:center;color:var(--muted);font-size:13px">No payouts logged yet. Add your first withdrawal below.</div>`;
  }

  // Add payout form
  h+=`<div style="margin-top:16px;padding:16px;border:1px solid var(--line)">`;
  h+=`<div class="fg"><div><label class="fl">Date</label><input type="date" class="fi" id="po_date" value="${new Date().toISOString().slice(0,10)}"></div><div><label class="fl">Amount ($)</label><input type="number" class="fi" id="po_amt" placeholder="5000" min="0" step="100"></div></div>`;
  h+=`<div class="fg" style="margin-top:12px"><div><label class="fl">From Account</label><select class="fi" id="po_acct"><option value="">—</option>${accounts.filter(a=>a.phase==="funded").map(a=>`<option value="${a.id}">${a.name}</option>`).join("")}</select></div><div><label class="fl">Notes</label><input class="fi" id="po_notes" placeholder="Bi-weekly payout..."></div></div>`;
  h+=`<button class="btn-a" style="margin-top:16px;width:100%" onclick="savePayout()">Log Payout</button></div>`;

  return h;
}

function savePayout(){
  const date=document.getElementById("po_date")?.value||"";
  const amount=parseFloat(document.getElementById("po_amt")?.value)||0;
  const account=document.getElementById("po_acct")?.value||"";
  const notes=document.getElementById("po_notes")?.value||"";
  if(amount<=0){toast("Enter payout amount","error");return}
  D.settings.goal.payouts.push({id:uid(),date,amount,account,notes});
  save();toast(`+$${amount.toLocaleString()} logged`);R();
}

// ═══ ROADMAP INTERACTIVITY ═══
const _rmPalette=[
  {r:'#34d399',g:'rgba(52,211,153,0.35)'},   // 0  START           emerald
  {r:'#fbbf24',g:'rgba(251,191,36,0.4)'},    // 1  CHALLENGE #1    amber
  {r:'#818cf8',g:'rgba(129,140,248,0.35)'},  // 2  VERIFICATION #1 indigo
  {r:'#22d3ee',g:'rgba(34,211,238,0.35)'},   // 3  FUNDED #1       cyan
  {r:'#fb923c',g:'rgba(251,146,60,0.35)'},   // 4  CHALLENGE #2    orange
  {r:'#fde047',g:'rgba(253,224,71,0.4)'},    // 5  FUNDED #2       yellow
  {r:'#f87171',g:'rgba(248,113,113,0.35)'},  // 6  CHALLENGE #3    red
  {r:'#a78bfa',g:'rgba(167,139,250,0.35)'},  // 7  FUNDED #3       violet
  {r:'#ff7043',g:'rgba(255,112,67,0.4)'},    // 8  $50K WITHDRAWN  deep-orange
  {r:'#fcd34d',g:'rgba(252,211,77,0.45)'},   // 9  $100K GOAL      gold
  {r:'#94a3b8',g:'rgba(148,163,184,0.3)'},   // 10 MASTER TRADER   silver
  {r:'#f1f5f9',g:'rgba(241,245,249,0.4)'},   // 11 FREEDOM         white
];
function _rmSetup(){
  const path=document.getElementById('rmPath');
  const g=document.getElementById('rmMarkers');
  if(!path||!g)return;
  const ms=window._rmMs;
  const step=window._rmStep||0;
  if(!ms)return;
  const L=path.getTotalLength();
  if(L<1)return;
  g.innerHTML='';
  const NS='http://www.w3.org/2000/svg';
  const mk=(tag,a)=>{const el=document.createElementNS(NS,tag);Object.entries(a||{}).forEach(([k,v])=>el.setAttribute(k,v));return el;};
  const tx=(tag,a,t)=>{const el=mk(tag,a);el.textContent=t;return el;};
  // Inject per-milestone radial gradients into SVG defs
  const svg=path.ownerSVGElement;
  let defs=svg.querySelector('defs');
  if(!defs){defs=mk('defs',{});svg.insertBefore(defs,svg.firstChild);}
  [...defs.querySelectorAll('[id^="rmRG"]')].forEach(el=>el.remove());
  _rmPalette.forEach((p,i)=>{
    const rg=mk('radialGradient',{id:`rmRG${i}`,cx:'35%',cy:'28%',r:'72%'});
    rg.appendChild(mk('stop',{'offset':'0%','stop-color':p.r,'stop-opacity':'0.88'}));
    rg.appendChild(mk('stop',{'offset':'100%','stop-color':p.r,'stop-opacity':'0.08'}));
    defs.appendChild(rg);
  });
  ms.forEach((m,i)=>{
    const isDone=i<step,isCur=i===step&&step<ms.length,isFut=i>step;
    const pt=path.getPointAtLength(m.progress*L);
    const x=pt.x,y=pt.y;
    const p=_rmPalette[i]||_rmPalette[_rmPalette.length-1];
    const rc=isCur?5.5:isDone?5:4.5;
    const op=isFut?0.3:1;
    const grp=mk('g',{opacity:op});
    grp.style.cursor='pointer';
    // Outer pulse ring for current milestone
    if(isCur){
      const pulse=mk('circle',{cx:x,cy:y,r:rc+5,fill:'none',stroke:p.r,'stroke-width':'0.4','stroke-opacity':'0.5'});
      pulse.style.animation='rmHalo 2.2s ease-in-out infinite';
      grp.appendChild(pulse);
      const pulse2=mk('circle',{cx:x,cy:y,r:rc+8.5,fill:'none',stroke:p.r,'stroke-width':'0.2','stroke-opacity':'0.22'});
      pulse2.style.animation='rmHalo 2.2s ease-in-out infinite 0.5s';
      grp.appendChild(pulse2);
    }
    // Soft glow behind circle
    if(!isFut){
      grp.appendChild(mk('circle',{cx:x,cy:y,r:rc+3.5,fill:p.g,'filter':'url(#rmBlur)'}));
    }
    // Outer metallic ring
    grp.appendChild(mk('circle',{cx:x,cy:y,r:rc+0.7,fill:'none',stroke:isDone?'#4ade80':p.r,'stroke-width':isCur?'0.6':isDone?'0.5':'0.35'}));
    // Body with radial gradient
    grp.appendChild(mk('circle',{cx:x,cy:y,r:rc,fill:isDone?'rgba(74,222,128,0.22)':isFut?'rgba(255,255,255,0.04)':`url(#rmRG${i})`}));
    // Glass rim
    grp.appendChild(mk('circle',{cx:x,cy:y,r:rc,fill:'none',stroke:'rgba(255,255,255,0.22)','stroke-width':'0.15'}));
    // Shimmer arc (top highlight)
    if(!isFut){
      grp.appendChild(mk('path',{d:`M ${x-rc*0.6},${y-rc*0.7} A ${rc},${rc} 0 0,1 ${x+rc*0.6},${y-rc*0.7}`,fill:'none',stroke:'rgba(255,255,255,0.5)','stroke-width':'0.25'}));
    }
    // Emoji icon
    const ie=tx('text',{x,y:y+rc*0.35,'text-anchor':'middle','font-size':rc*0.9,'dominant-baseline':'middle',opacity:isFut?0.35:1},m.icon);
    ie.style.pointerEvents='none';
    grp.appendChild(ie);
    // Completed green check badge
    if(isDone){
      grp.appendChild(mk('circle',{cx:x+rc*0.82,cy:y-rc*0.82,r:rc*0.38,fill:'#22c55e',stroke:'#0f172a','stroke-width':'0.2'}));
      grp.appendChild(tx('text',{x:x+rc*0.82,y:y-rc*0.82,'text-anchor':'middle','font-size':rc*0.36,fill:'white','dominant-baseline':'middle','font-weight':'700'},'✓'));
    }
    // Step number badge (upcoming)
    if(isFut){
      grp.appendChild(mk('circle',{cx:x+rc*0.82,cy:y-rc*0.82,r:rc*0.35,fill:'rgba(255,255,255,0.08)',stroke:'rgba(255,255,255,0.15)','stroke-width':'0.15'}));
      grp.appendChild(tx('text',{x:x+rc*0.82,y:y-rc*0.82,'text-anchor':'middle','font-size':rc*0.3,fill:'rgba(255,255,255,0.4)','dominant-baseline':'middle'},String(i+1)));
    }
    // Label — smart side based on x position
    const isLeft=x<50;
    const lx=isLeft?x+rc+5:x-rc-5;
    const anc=isLeft?'start':'end';
    const lblCol=isFut?'rgba(255,255,255,0.22)':(isDone?'#4ade80':p.r);
    grp.appendChild(tx('text',{x:lx,y:y-1,'text-anchor':anc,'font-size':'3.8',fill:'white',opacity:isFut?0.22:0.95,'font-weight':'700'},m.label));
    grp.appendChild(tx('text',{x:lx,y:y+3.2,'text-anchor':anc,'font-size':'2.8',fill:p.r,opacity:isFut?0.14:0.78},m.sub));
    // YOU ARE HERE indicator
    if(isCur){
      const yah=tx('text',{x,y:y+rc+5.5,'text-anchor':'middle','font-size':'2.2',fill:p.r,opacity:'0.95','font-weight':'700','letter-spacing':'0.5'},'▼ YOU ARE HERE');
      yah.style.animation='rmHalo 2.2s ease-in-out infinite';
      grp.appendChild(yah);
    }
    // Invisible hit area
    const hit=mk('circle',{cx:x,cy:y,r:rc+7,fill:'transparent'});
    hit.addEventListener('click',()=>rmModal(i));
    grp.appendChild(hit);
    g.appendChild(grp);
  });
}
function rmModal(i){
  const ms=window._rmMs,step=window._rmStep||0;
  if(!ms||!ms[i])return;
  const m=ms[i];
  const isDone=i<step,isCur=i===step&&step<ms.length;
  const p=_rmPalette[i]||_rmPalette[_rmPalette.length-1];
  const sc=isDone?'#22c55e':isCur?p.r:'var(--muted)';
  const sl=isDone?'COMPLETED':isCur?'CURRENT':'UPCOMING';
  let c=`<div style="text-align:center;margin-bottom:20px">`;

function _rmParsePath(d){
  const t=d.trim().split(/\s+/);const nodes=[];let i=0;
  while(i<t.length){const cmd=t[i++];
    if(cmd==='M')nodes.push({type:'M',x:+t[i++],y:+t[i++]});
    else if(cmd==='C')nodes.push({type:'C',cp1x:+t[i++],cp1y:+t[i++],cp2x:+t[i++],cp2y:+t[i++],x:+t[i++],y:+t[i++]});
  }return nodes;
}
function _rmSerializePath(nodes){
  return nodes.map(n=>n.type==='M'?`M ${n.x.toFixed(2)} ${n.y.toFixed(2)}`:`C ${n.cp1x.toFixed(2)} ${n.cp1y.toFixed(2)} ${n.cp2x.toFixed(2)} ${n.cp2y.toFixed(2)} ${n.x.toFixed(2)} ${n.y.toFixed(2)}`).join(' ');
}
function _rmTransformPath(nodes,dx,dy,sx,sy){
  const cx=50,cy=82.5;
  return nodes.map(n=>{
    if(n.type==='M')return{...n,x:cx+(n.x-cx)*sx+dx,y:cy+(n.y-cy)*sy+dy};
    return{...n,cp1x:cx+(n.cp1x-cx)*sx+dx,cp1y:cy+(n.cp1y-cy)*sy+dy,
      cp2x:cx+(n.cp2x-cx)*sx+dx,cp2y:cy+(n.cp2y-cy)*sy+dy,
      x:cx+(n.x-cx)*sx+dx,y:cy+(n.y-cy)*sy+dy};
  });
}
function _rmSyncPaths(pd){
  document.querySelectorAll('.rm-svg path').forEach(p=>{if(p)p.setAttribute('d',pd);});
  const out=document.getElementById('rmPathOut');if(out)out.value=pd;
}
function _rmEditSetup(){
  const svg=document.querySelector('.rm-svg');if(!svg)return;
  let eg=document.getElementById('rmEditG');if(eg)eg.remove();
  const NS='http://www.w3.org/2000/svg';
  const mk=(tag,a)=>{const el=document.createElementNS(NS,tag);Object.entries(a||{}).forEach(([k,v])=>el.setAttribute(k,v));return el;};
  eg=mk('g',{id:'rmEditG'});svg.appendChild(eg);
  const nodes=window._rmEditNodes;
  let prev=null;
  nodes.forEach((n,i)=>{
    if(n.type==='M'){
      eg.appendChild(mk('circle',{cx:n.x,cy:n.y,r:'2',fill:'#fbbf24',stroke:'white','stroke-width':'0.5','data-idx':i,'data-field':'xy','class':'rme-h rme-a'}));
      prev={x:n.x,y:n.y};
    }else{
      if(prev)eg.appendChild(mk('line',{x1:prev.x,y1:prev.y,x2:n.cp1x,y2:n.cp1y,stroke:'rgba(255,200,50,0.5)','stroke-width':'0.5','stroke-dasharray':'1.5 1',id:`rl-${i}-1`}));
      eg.appendChild(mk('line',{x1:n.x,y1:n.y,x2:n.cp2x,y2:n.cp2y,stroke:'rgba(255,200,50,0.5)','stroke-width':'0.5','stroke-dasharray':'1.5 1',id:`rl-${i}-2`}));
      eg.appendChild(mk('circle',{cx:n.cp1x,cy:n.cp1y,r:'1.4',fill:'#a78bfa',stroke:'rgba(255,255,255,0.7)','stroke-width':'0.35','data-idx':i,'data-field':'cp1','class':'rme-h rme-cp'}));
      eg.appendChild(mk('circle',{cx:n.cp2x,cy:n.cp2y,r:'1.4',fill:'#a78bfa',stroke:'rgba(255,255,255,0.7)','stroke-width':'0.35','data-idx':i,'data-field':'cp2','class':'rme-h rme-cp'}));
      eg.appendChild(mk('circle',{cx:n.x,cy:n.y,r:'2',fill:'#fbbf24',stroke:'white','stroke-width':'0.5','data-idx':i,'data-field':'xy','class':'rme-h rme-a'}));
      prev={x:n.x,y:n.y};
    }
  });
  let drag=null;
  function svgPt(evt){const e=evt.touches?evt.touches[0]:evt;const pt=new DOMPoint(e.clientX,e.clientY);return pt.matrixTransform(svg.getScreenCTM().inverse());}
  function onDown(evt){const t=evt.target;if(!t.classList||!t.classList.contains('rme-h'))return;evt.preventDefault();evt.stopPropagation();drag={idx:+t.dataset.idx,field:t.dataset.field,el:t};}
  function onMove(evt){
    if(!drag)return;evt.preventDefault();
    const pt=svgPt(evt);const n=window._rmEditNodes[drag.idx];
    if(drag.field==='xy'){n.x=pt.x;n.y=pt.y;drag.el.setAttribute('cx',pt.x);drag.el.setAttribute('cy',pt.y);}
    else if(drag.field==='cp1'){n.cp1x=pt.x;n.cp1y=pt.y;drag.el.setAttribute('cx',pt.x);drag.el.setAttribute('cy',pt.y);}
    else if(drag.field==='cp2'){n.cp2x=pt.x;n.cp2y=pt.y;drag.el.setAttribute('cx',pt.x);drag.el.setAttribute('cy',pt.y);}
    // Update connector lines
    const i=drag.idx,nodes=window._rmEditNodes,nl=nodes[i],prev=nodes[i-1];
    const l1=document.getElementById(`rl-${i}-1`);if(l1&&prev){l1.setAttribute('x1',prev.x);l1.setAttribute('y1',prev.y);l1.setAttribute('x2',nl.cp1x);l1.setAttribute('y2',nl.cp1y);}
    const l2=document.getElementById(`rl-${i}-2`);if(l2){l2.setAttribute('x1',nl.x);l2.setAttribute('y1',nl.y);l2.setAttribute('x2',nl.cp2x);l2.setAttribute('y2',nl.cp2y);}
    const next=nodes[i+1];if(next){const ln=document.getElementById(`rl-${i+1}-1`);if(ln){ln.setAttribute('x1',nl.x);ln.setAttribute('y1',nl.y);}}
    _rmSyncPaths(_rmSerializePath(window._rmEditNodes));
  }
  function onUp(){drag=null;}
  svg.addEventListener('mousedown',onDown);svg.addEventListener('mousemove',onMove);
  svg.addEventListener('mouseup',onUp);svg.addEventListener('mouseleave',onUp);
  svg.addEventListener('touchstart',onDown,{passive:false});svg.addEventListener('touchmove',onMove,{passive:false});svg.addEventListener('touchend',onUp);
  // Populate textarea with current path
  const out=document.getElementById('rmPathOut');
  if(out)out.value=_rmSerializePath(window._rmEditNodes);
}
function rmToggleEdit(){
  window._rmEditMode=!window._rmEditMode;
  if(window._rmEditMode){const path=document.getElementById('rmPath');if(path)window._rmEditNodes=_rmParsePath(path.getAttribute('d'));}
  R();
}
function rmApplyTransform(){
  const dx=+(document.getElementById('rme-dx').value)||0;
  const dy=+(document.getElementById('rme-dy').value)||0;
  const sx=+(document.getElementById('rme-sx').value)||1;
  const sy=+(document.getElementById('rme-sy').value)||1;
  window._rmEditNodes=_rmTransformPath(window._rmEditNodes,dx,dy,sx,sy);
  const pd=_rmSerializePath(window._rmEditNodes);
  _rmSyncPaths(pd);
  document.getElementById('rme-dx').value=0;document.getElementById('rme-dy').value=0;
  document.getElementById('rme-sx').value=1;document.getElementById('rme-sy').value=1;
  _rmEditSetup();
}
